name: Create and publish a Docker image

on:
  workflow_dispatch:
  push:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

# https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      REGISTRY_IMAGE: ${{ steps.registry.outputs.REGISTRY_IMAGE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: './docker/neon-proxy/Dockerfile'

      - name: Registry image name
        id: registry
        run: |
          echo "REGISTRY_IMAGE=${REGISTRY@L}/${GITHUB_REPOSITORY@L}" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  build:
    needs:
      - prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04

          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Sanitize platform
        id: sanitize
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.REGISTRY_IMAGE }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,manifest-descriptor # used by GitHub packages for digest annotation

      - name: Build by digest
        id: build-image
        uses: docker/build-push-action@v7
        with:
          context: ./docker/neon-proxy/
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          outputs: |
            type=image,name=${{ needs.prepare.outputs.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=buildkit-${{ steps.sanitize.outputs.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=buildkit-${{ steps.sanitize.outputs.PLATFORM_PAIR }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-image.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ steps.sanitize.outputs.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ needs.prepare.outputs.REGISTRY_IMAGE }}
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index # used by GitHub packages for manifest annotation

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          mapfile -t annotations < <(jq -r '.annotations[]?' <<< "$DOCKER_METADATA_OUTPUT_JSON")

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(--tag "$tag")
          done

          annotation_args=()
          for annotation in "${annotations[@]}"; do
            annotation_args+=(--annotation "$annotation")
          done

          source_args=()
          for digest in *; do
            source_args+=("${{ needs.prepare.outputs.REGISTRY_IMAGE }}@sha256:${digest}")
          done

          docker buildx imagetools create \
            "${tag_args[@]}" \
            "${annotation_args[@]}" \
            "${source_args[@]}"

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ needs.prepare.outputs.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}
